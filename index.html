<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0b1020" />
  <meta name="description" content="Bubble Smash - クリック/タップでバブルを連続爆破するストレス発散ゲーム" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Bubble Smash - ストレス発散ゲーム</title>
  <link rel="stylesheet" href="src/styles.css" />
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='42' fill='%23ff5fa2'/><circle cx='38' cy='38' r='12' fill='%23ffd5ea'/></svg>" />
</head>
<body>
  <canvas id="game" aria-label="ゲーム画面"></canvas>

  <header class="hud" aria-live="polite">
    <div class="hud-cell">
      <span class="hud-label">スコア</span>
      <span class="hud-value" id="score">0</span>
    </div>
    <div class="hud-cell hud-combo" id="comboBox" hidden>
      <span class="hud-label">コンボ</span>
      <span class="hud-value"><span id="combo">0</span>×<span id="multiplier">1.0</span></span>
    </div>
    <div class="hud-cell">
      <span class="hud-label">ベスト</span>
      <span class="hud-value" id="best">0</span>
    </div>
  </header>

  <button class="icon-btn settings-btn" id="settingsBtn" aria-label="設定">
    <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
      <path fill="currentColor" d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8Zm9.43 4a7.6 7.6 0 0 0-.07-1.05l2.11-1.65-2-3.46-2.49 1a7.6 7.6 0 0 0-1.81-1.05l-.38-2.65h-4l-.38 2.65a7.6 7.6 0 0 0-1.81 1.05l-2.49-1-2 3.46 2.11 1.65A7.6 7.6 0 0 0 4.57 12c0 .36.03.71.07 1.05L2.53 14.7l2 3.46 2.49-1c.55.43 1.16.78 1.81 1.05l.38 2.65h4l.38-2.65c.65-.27 1.26-.62 1.81-1.05l2.49 1 2-3.46-2.11-1.65c.04-.34.07-.69.07-1.05Z"/>
    </svg>
  </button>

  <div class="combo-pop" id="comboPop" aria-hidden="true"></div>

  <div class="overlay" id="startOverlay">
    <div class="panel">
      <h1 class="title">
        <span class="title-bubble" style="--c:#ff5fa2">B</span><span class="title-bubble" style="--c:#ffb347">u</span><span class="title-bubble" style="--c:#5ad7ff">b</span><span class="title-bubble" style="--c:#a4ff5f">b</span><span class="title-bubble" style="--c:#c08bff">l</span><span class="title-bubble" style="--c:#ffd860">e</span>
        <br/>
        <span class="title-sub">SMASH</span>
      </h1>
      <p class="lead">クリック / タップで バブルを 連続爆破!<br/>
        ストレスを 吹き飛ばそう。</p>
      <ul class="legend">
        <li><span class="dot dot-normal"></span>通常 +10</li>
        <li><span class="dot dot-bomb"></span>ボム 周囲爆破</li>
        <li><span class="dot dot-rainbow"></span>レインボー 全消し</li>
        <li><span class="dot dot-gold"></span>ゴールド +100</li>
      </ul>
      <button class="btn btn-primary" id="startBtn">スタート</button>
      <p class="footnote">音を有効にすると もっと爽快</p>
    </div>
  </div>

  <div class="overlay" id="settingsOverlay" hidden>
    <div class="panel">
      <h2 class="panel-title">設定</h2>
      <label class="row">
        <span>サウンド</span>
        <input type="checkbox" id="soundToggle" checked />
      </label>
      <label class="row">
        <span>振動 (対応端末)</span>
        <input type="checkbox" id="hapticToggle" checked />
      </label>
      <label class="row">
        <span>エフェクト量</span>
        <select id="fxSelect">
          <option value="low">控えめ</option>
          <option value="medium" selected>標準</option>
          <option value="high">最大</option>
        </select>
      </label>
      <label class="row">
        <span>難易度 (出現速度)</span>
        <select id="difficultySelect">
          <option value="easy">やさしい</option>
          <option value="normal" selected>ふつう</option>
          <option value="hard">きびしい</option>
          <option value="insane">極</option>
        </select>
      </label>
      <div class="row">
        <button class="btn btn-ghost" id="resetBestBtn">ベスト記録をリセット</button>
      </div>
      <button class="btn btn-primary" id="closeSettingsBtn">閉じる</button>
    </div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
