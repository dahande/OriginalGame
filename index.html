<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#fde7c2" />
  <meta name="description" content="青森りんご合体パズル - 紅玉から世界一まで、青森のりんご11品種を合体させる落ちもの物理パズル" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>青森りんご合体 - Aomori Apple Merge</title>
  <link rel="stylesheet" href="src/styles.css" />
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='55' r='40' fill='%23c0271e'/><rect x='47' y='13' width='6' height='14' fill='%235a3a1a'/><ellipse cx='62' cy='18' rx='12' ry='5' transform='rotate(-25 62 18)' fill='%233f8c3f'/></svg>" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <span class="brand-icon" aria-hidden="true">🍎</span>
        <div class="brand-text">
          <span class="brand-jp">青森りんご合体</span>
          <span class="brand-en">AOMORI APPLE MERGE</span>
        </div>
      </div>

      <div class="hud">
        <div class="hud-cell">
          <span class="hud-label">SCORE</span>
          <span class="hud-value" id="score">0</span>
        </div>
        <div class="hud-cell">
          <span class="hud-label">BEST</span>
          <span class="hud-value" id="best">0</span>
        </div>
        <div class="hud-cell hud-next">
          <span class="hud-label">NEXT</span>
          <canvas id="next" width="64" height="64" aria-label="次のりんご"></canvas>
        </div>
        <button class="icon-btn" id="soundBtn" aria-label="サウンド 切替">
          <svg class="ico-on" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path fill="currentColor" d="M3 10v4h4l5 5V5L7 10H3Zm13.5 2c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02ZM14 3.23v2.06c2.89.86 5 3.54 5 6.71 0 3.17-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77 0-4.28-2.99-7.86-7-8.77Z"/>
          </svg>
          <svg class="ico-off" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path fill="currentColor" d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.41.05-.63ZM19 12c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.796 8.796 0 0 0 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71ZM4.27 3 3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06a8.99 8.99 0 0 0 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3ZM12 4l-2.09 2.09L12 8.18V4Z"/>
          </svg>
        </button>
      </div>
    </header>

    <main class="play-area">
      <div class="play-wrap">
        <canvas id="game" width="480" height="720" aria-label="プレイ盤面"></canvas>
      </div>
      <aside class="evolution" aria-label="進化チェーン">
        <h3>進化</h3>
        <ol id="evoList"></ol>
      </aside>
    </main>

    <footer class="footer">
      <span>同じ品種を 合体させて 世界一を 目指そう</span>
      <span class="credit">画像: <a href="https://commons.wikimedia.org" target="_blank" rel="noopener">Wikimedia Commons</a></span>
    </footer>
  </div>

  <div class="overlay" id="gameOverModal" hidden>
    <div class="panel">
      <h2 class="panel-title">ゲームオーバー</h2>
      <p class="lead">
        <span class="big-score" id="finalScore">0</span>
        <span class="lead-label">最終スコア</span>
      </p>
      <p class="record" id="recordLine"></p>
      <p class="best-tier-line">最高到達: <span id="bestTierName">紅玉</span></p>
      <button class="btn btn-primary" id="restartBtn">もう一度</button>
    </div>
  </div>

  <div class="score-pop-layer" id="popLayer" aria-hidden="true"></div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
